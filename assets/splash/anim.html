<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VTTO Key Animation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }
  .scene {
    perspective: 1200px;
    width: 500px;
    height: 282px;
    position: relative;
    transform-origin: center center;
  }
  .layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
  }
  .layer img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  .replay-btn {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.08);
    color: #666;
    border: 1px solid #333;
    padding: 10px 24px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-family: sans-serif;
    transition: all 0.2s;
  }
  .replay-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
</style>
</head>

function later(fn,ms){T.push(setTimeout(fn,ms));}

// Key shape squish: close the gaps
const TT_KEY=-25;
const O_KEY=-40;

function run(){
  ['barLayer','bar2Layer','pieceA','pieceV','pieceTT','pieceO'].forEach(id=>{
    s(id,{opacity:'0',transform:'none',transition:'none',transformOrigin:'center center'});
  });

  // PHASE 1: Bar vertical
  later(()=>{s('barLayer',{opacity:'1',transform:'rotate(-90deg) scale(0.55)',transition:'none'});},300);
  later(()=>{s('barLayer',{transform:'rotate(-90deg) scale(0.6)',transition:'transform 0.3s ease-out'});},400);

  // PHASE 2: Falls horizontal
  later(()=>{s('barLayer',{transform:'rotate(0deg) scale(0.6)',transition:'transform 0.5s cubic-bezier(0.55,0,1,0.45)'});},1000);
  later(()=>{s('barLayer',{transform:'rotate(2deg) scale(0.6)',transition:'transform 0.08s ease-out'});},1520);
  later(()=>{s('barLayer',{transform:'rotate(0deg) scale(0.6)',transition:'transform 0.12s ease-in-out'});},1610);

  // PHASE 3: Y-spin
  later(()=>{s('barLayer',{transform:'rotateY(90deg) scale(0.6)',transition:'transform 0.4s ease-in'});},2100);
  later(()=>{
    s('barLayer',{opacity:'0'});
    s('bar2Layer',{opacity:'1',transform:'rotateY(-90deg)',transition:'none'});
    later(()=>{s('bar2Layer',{transform:'rotateY(0deg)',transition:'transform 0.5s cubic-bezier(0.23,1,0.32,1)'});},30);
  },2500);

  // PHASE 4: Wall rise → key shape
  later(()=>{
    s('bar2Layer',{transform:'rotateX(-90deg)',transformOrigin:'center bottom',transition:'transform 0.5s ease-in'});
  },3400);

  later(()=>{
    s('bar2Layer',{opacity:'0'});
    s('pieceA', {opacity:'1',transform:'translateX(0px) rotateX(90deg)',transformOrigin:'center bottom',transition:'none'});
    s('pieceTT',{opacity:'1',transform:'translateX('+TT_KEY+'px) rotateX(90deg)',transformOrigin:'center bottom',transition:'none'});
    s('pieceO', {opacity:'1',transform:'translateX('+O_KEY+'px) rotateX(90deg)',transformOrigin:'center bottom',transition:'none'});

    later(()=>{
      var t='transform 0.6s cubic-bezier(0.23,1,0.32,1)';
      s('pieceA', {transform:'translateX(0px) rotateX(0deg)',transition:t});
      s('pieceTT',{transform:'translateX('+TT_KEY+'px) rotateX(0deg)',transition:t});
      s('pieceO', {transform:'translateX('+O_KEY+'px) rotateX(0deg)',transition:t});
    },30);
  },3900);

  // PHASE 5: Spread + A→V
  later(()=>{
    var spread='transform 0.7s cubic-bezier(0.23,1,0.32,1)';
    s('pieceTT',{transform:'translateX(0px)',transition:spread});
    s('pieceO', {transform:'translateX(0px)',transition:spread});
    s('pieceA', {transform:'rotateX(90deg)',transformOrigin:'center center',transition:'transform 0.5s ease-in'});
    s('pieceV', {opacity:'0',transform:'rotateX(-90deg)',transformOrigin:'center center',transition:'none'});

    later(()=>{
      s('pieceA',{opacity:'0'});
      s('pieceV',{opacity:'1',transform:'rotateX(-90deg)',transition:'none'});
      later(()=>{s('pieceV',{transform:'rotateX(0deg)',transition:'transform 0.5s ease-out'});},30);
    },520);
  },5000);

  // Signal animation complete to React Native
  later(()=>{
    if(window.ReactNativeWebView){window.ReactNativeWebView.postMessage('done');}
  },6650);
}

function replay(){T.forEach(t=>clearTimeout(t));T=[];run();}
setImages();
// Scale scene to fit mobile viewport (75% of screen width)
var sceneEl = document.querySelector('.scene');
var scaleVal = window.innerWidth * 0.75 / 500;
sceneEl.style.transform = 'scale(' + scaleVal + ')';
run();
</script>
</body>
</html>
